<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urlaubsplaner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: #fff; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .logo { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: #16a34a; }
  .logo span { color: #94a3b8; }
  .year-nav { display: flex; align-items: center; gap: 10px; }
  .year-nav button { background: #f8fafc; border: 1px solid #e2e8f0; color: #1e293b; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .year-nav button:hover { background: #e2e8f0; }
  .year-display { font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 500; min-width: 50px; text-align: center; }
  .controls { display: flex; gap: 8px; }
  .btn { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; }
  .btn-primary { background: #16a34a; color: #fff; }
  .btn-primary:hover { background: #15803d; }
  .btn-secondary { background: #f1f5f9; color: #1e293b; border: 1px solid #e2e8f0; }
  .btn-secondary:hover { background: #e2e8f0; }
  .legend-bar { display: flex; gap: 14px; padding: 8px 20px; background: #fff; border-bottom: 1px solid #e2e8f0; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #64748b; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  .calendar-wrap { padding: 16px 20px; overflow-x: auto; }
  .calendar-halves { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; min-width: 800px; }
  .calendar { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
  .cal-header { display: flex; background: #f8fafc; border-bottom: 2px solid #e2e8f0; position: sticky; top: 57px; z-index: 50; }
  .col-date { width: 90px; min-width: 90px; flex-shrink: 0; padding: 10px 8px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; border-right: 2px solid #e2e8f0; }
  .col-emp { min-width: 80px; flex: 1; padding: 8px 6px; font-size: 11px; font-weight: 600; color: #1e293b; border-right: 1px solid #e2e8f0; text-align: center; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .col-emp:last-child { border-right: none; }
  .emp-avatar { width: 20px; height: 20px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .month-block { border-bottom: 2px solid #e2e8f0; }
  .month-block:last-child { border-bottom: none; }
  .month-title { background: #f8fafc; padding: 5px 10px; font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 8px; }
  .hcount { font-size: 10px; font-weight: 400; color: #94a3b8; }
  .day-row { display: flex; border-bottom: 1px solid #f1f5f9; min-height: 26px; }
  .day-row:last-child { border-bottom: none; }
  .day-row.weekend { background: #f8fafc; }
  .day-row.holiday { background: #fef9c3; }
  .day-row.today { background: #f0fdf4; }
  .date-cell { width: 90px; min-width: 90px; flex-shrink: 0; padding: 3px 6px; font-size: 10px; font-family: 'DM Mono', monospace; color: #475569; border-right: 2px solid #e2e8f0; display: flex; align-items: center; gap: 4px; }
  .day-row.weekend .date-cell { color: #94a3b8; }
  .day-row.holiday .date-cell { color: #a16207; }
  .day-row.today .date-cell { color: #16a34a; font-weight: 700; }
  .date-dow { font-size: 9px; opacity: 0.8; min-width: 14px; }
  .date-num { font-weight: 500; min-width: 16px; text-align: right; }
  .date-holiday { font-size: 8px; color: #a16207; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 50px; }
  .emp-cell { min-width: 80px; flex: 1; border-right: 1px solid #f1f5f9; position: relative; cursor: pointer; }
  .emp-cell:last-child { border-right: none; }
  .emp-cell:hover { background: rgba(22,163,74,0.05); }
  .day-row.weekend .emp-cell { border-right-color: #e2e8f0; }
  .vac-fill { position: absolute; inset: 2px 3px; border-radius: 3px; display: flex; align-items: center; padding: 0 4px; font-size: 9px; font-weight: 600; color: #000; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; cursor: pointer; }
  .vac-fill:hover { opacity: 0.75; }
  .vac-fill.middle { inset: 0 3px; border-radius: 0; }
  .vac-fill.end { border-radius: 0 0 3px 3px; }
  .vac-fill.start { border-radius: 3px 3px 0 0; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
  .modal-overlay.active { display: flex; }
  .modal { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 22px; width: 380px; max-width: 92vw; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
  .modal h2 { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 10px; font-weight: 600; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input { width: 100%; padding: 8px 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; color: #1e293b; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; }
  .form-group input:focus { border-color: #16a34a; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
  .type-btn { padding: 5px 10px; border-radius: 5px; border: 2px solid transparent; cursor: pointer; font-size: 11px; font-weight: 600; color: #000; }
  .type-btn.selected { border-color: #1e293b; }
  .color-type { display: flex; gap: 5px; flex-wrap: wrap; }
  .delete-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 11px; padding: 3px 6px; border-radius: 4px; }
  .delete-btn:hover { background: #fee2e2; }
  .list-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #f1f5f9; font-size: 12px; }
  .list-row:last-child { border-bottom: none; }
  .tooltip { display: none; position: fixed; background: #1e293b; color: #f1f5f9; border-radius: 7px; padding: 7px 10px; font-size: 11px; z-index: 3000; pointer-events: none; max-width: 200px; }
  .tooltip.visible { display: block; }
  .tt-name { font-weight: 600; color: #4ade80; margin-bottom: 2px; }
  .tt-dates { color: #94a3b8; font-family: 'DM Mono', monospace; font-size: 10px; }
  .tt-note { margin-top: 2px; font-size: 10px; color: #cbd5e1; }
  .loading { text-align: center; padding: 40px; color: #94a3b8; }

  /* === Jahresuebersicht === */
  .overview-wrap { padding: 16px 20px 0; overflow-x: auto; }
  .overview { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; min-width: 700px; }
  .overview-header { display: flex; background: #f8fafc; border-bottom: 2px solid #e2e8f0; }
  .ov-name-col { width: 120px; min-width: 120px; flex-shrink: 0; padding: 7px 10px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; border-right: 1px solid #e2e8f0; }
  .ov-months { display: flex; flex: 1; }
  .ov-month-hd { flex: 1; text-align: center; padding: 7px 2px; font-size: 9px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.3px; border-right: 1px solid #e2e8f0; }
  .ov-month-hd:last-child { border-right: none; }
  .ov-row { display: flex; border-bottom: 1px solid #f1f5f9; min-height: 30px; }
  .ov-row:last-child { border-bottom: none; }
  .ov-row:hover { background: #f8fafc; }
  .ov-name { width: 120px; min-width: 120px; flex-shrink: 0; padding: 5px 10px; font-size: 11px; font-weight: 500; color: #1e293b; border-right: 1px solid #e2e8f0; display: flex; align-items: center; gap: 6px; overflow: hidden; }
  .ov-name span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ov-cells { display: flex; flex: 1; }
  .ov-cell { flex: 1; position: relative; border-right: 1px solid #f1f5f9; }
  .ov-cell:last-child { border-right: none; }
  .ov-bar { position: absolute; top: 4px; bottom: 4px; border-radius: 3px; min-width: 2px; opacity: 0.85; cursor: pointer; transition: opacity 0.1s; }
  .ov-bar:hover { opacity: 1; }
  .section-divider { padding: 12px 20px 0; display: flex; align-items: center; gap: 10px; }
  .section-divider span { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .section-divider hr { flex: 1; border: none; border-top: 1px solid #e2e8f0; }
</style>
</head>
<body>

<header>
  <div class="logo">urlaub<span>.plan</span></div>
  <div class="year-nav">
    <button onclick="changeYear(-1)">&#8249;</button>
    <div class="year-display" id="yearDisplay">2026</div>
    <button onclick="changeYear(1)">&#8250;</button>
  </div>
  <div class="controls">
    <button class="btn btn-secondary" onclick="openCatModal()">Kategorien</button>
    <button class="btn btn-secondary" onclick="openEmpModal()">+ Mitarbeiter</button>
    <button class="btn btn-primary" onclick="exportData()">Export</button>
  </div>
</header>

<div class="legend-bar" id="legend"></div>

<div class="overview-wrap">
  <div class="overview" id="overview"></div>
</div>

<div class="section-divider">
  <span>Detailansicht</span>
  <hr>
</div>

<div class="calendar-wrap">
  <div class="calendar-halves">
    <div class="calendar" id="cal-h1"><div class="loading">Lade...</div></div>
    <div class="calendar" id="cal-h2"><div class="loading">Lade...</div></div>
  </div>
</div>

<div class="modal-overlay" id="vacModal">
  <div class="modal">
    <h2 id="vacTitle">Eintrag</h2>
    <div class="form-group"><label>Typ</label><div class="color-type" id="typeButtons"></div></div>
    <div class="form-row">
      <div class="form-group"><label>Von</label><input type="date" id="startDate"></div>
      <div class="form-group"><label>Bis</label><input type="date" id="endDate"></div>
    </div>
    <div class="form-group"><label>Notiz</label><input type="text" id="vacNote" placeholder="z.B. Mallorca"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="deleteVacBtn" style="display:none;margin-right:auto;color:#ef4444" onclick="deleteCurrentVac()">Loeschen</button>
      <button class="btn btn-secondary" onclick="closeModal('vacModal')">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveVac()">Speichern</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="empModal">
  <div class="modal">
    <h2>Mitarbeiter</h2>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input type="text" id="empName" placeholder="Max Mustermann" style="flex:1;padding:8px 10px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;color:#1e293b;font-size:13px;outline:none">
      <button class="btn btn-primary" onclick="addEmployee()">+</button>
    </div>
    <div id="empList"></div>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal('empModal')">Schliessen</button></div>
  </div>
</div>

<div class="modal-overlay" id="catModal">
  <div class="modal">
    <h2>Kategorien</h2>
    <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
      <input type="text" id="catName" placeholder="Name" style="flex:1;padding:8px 10px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;color:#1e293b;font-size:13px;outline:none">
      <input type="color" id="catColor" value="#a78bfa" style="width:38px;height:34px;border:1px solid #e2e8f0;border-radius:6px;cursor:pointer;padding:2px">
      <button class="btn btn-primary" onclick="addCategory()">+</button>
    </div>
    <div id="catList"></div>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal('catModal')">Schliessen</button></div>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tt-name" id="ttName"></div>
  <div class="tt-dates" id="ttDates"></div>
  <div class="tt-note" id="ttNote"></div>
</div>

<script>
var MONTHS = ['Januar','Februar','Maerz','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
var DAYS = ['So','Mo','Di','Mi','Do','Fr','Sa'];
var AVATARCOLORS = ['#3b82f6','#8b5cf6','#f59e0b','#ef4444','#06b6d4','#ec4899','#10b981','#f97316'];
var FIXED_HOL = [{m:0,d:1,n:'Neujahr'},{m:4,d:1,n:'Tag der Arbeit'},{m:9,d:3,n:'Tag der Dt. Einheit'},{m:11,d:25,n:'1. Weihnachtstag'},{m:11,d:26,n:'2. Weihnachtstag'}];
var EASTER_HOL = [{o:-2,n:'Karfreitag'},{o:1,n:'Ostermontag'},{o:39,n:'Christi Himmelfahrt'},{o:50,n:'Pfingstmontag'}];

function pad(n) { return n < 10 ? '0'+n : ''+n; }
function dateStr(y,m,d) { return y+'-'+pad(m+1)+'-'+pad(d); }
function daysInRange(s,e) { return Math.round((new Date(e)-new Date(s))/86400000)+1; }
function getInitials(n) { return n.split(' ').map(function(x){return x[0]||'';}).join('').toUpperCase().slice(0,2); }
function getCat(id) { var c = categories.find(function(c){return c.id===id;}); return c||{name:id,color:'#94a3b8'}; }

function getEaster(y) {
  var a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31)-1,da=((h+l-7*m+114)%31)+1;
  return new Date(y,mo,da);
}

function getHolidays(y) {
  var map = {};
  FIXED_HOL.forEach(function(h){ map[dateStr(y,h.m,h.d)] = h.n; });
  var easter = getEaster(y);
  EASTER_HOL.forEach(function(h){
    var d = new Date(easter.getTime());
    d.setDate(d.getDate()+h.o);
    map[dateStr(d.getFullYear(),d.getMonth(),d.getDate())] = h.n;
  });
  return map;
}

var currentYear = new Date().getFullYear();
var selectedType = null;
var currentEmpId = null;
var editingVacId = null;
var employees = [], categories = [], vacations = [];

var useBackend = false;

async function apiCall(method, path, body) {
  var opts = {method:method, headers:{'Content-Type':'application/json'}};
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch('/api'+path, opts);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// --- Fallback: lokale DB wenn kein Backend ---
var _nextId = 1;
function nextId() { return _nextId++; }
function dbLoad() {
  try {
    var raw = localStorage.getItem('urlaubsplaner');
    if (raw) { var d=JSON.parse(raw); employees=d.employees||[]; categories=d.categories||[]; vacations=d.vacations||[]; _nextId=d.nextId||1; }
  } catch(e) {}
}
function dbSave() {
  localStorage.setItem('urlaubsplaner', JSON.stringify({employees:employees,categories:categories,vacations:vacations,nextId:_nextId}));
}
async function localCall(method, path, body) {
  if (path==='/employees'&&method==='GET') return employees;
  if (path==='/employees'&&method==='POST') { var e={id:nextId(),name:body.name}; employees.push(e); dbSave(); return e; }
  if (path.match(/^\/employees\/\d+$/)&&method==='DELETE') { var eid=parseInt(path.split('/')[2]); employees=employees.filter(function(e){return e.id!==eid;}); vacations=vacations.filter(function(v){return v.employee_id!==eid;}); dbSave(); return {}; }
  if (path==='/categories'&&method==='GET') return categories;
  if (path==='/categories'&&method==='POST') { var c={id:body.id,name:body.name,color:body.color}; categories.push(c); dbSave(); return c; }
  if (path.match(/^\/categories\//)&&method==='PUT') { var ci=categories.findIndex(function(c){return c.id===path.split('/')[2];}); if(ci>=0){categories[ci]=body;dbSave();} return body; }
  if (path.match(/^\/categories\//)&&method==='DELETE') { categories=categories.filter(function(c){return c.id!==path.split('/')[2];}); dbSave(); return {}; }
  if (path==='/vacations'&&method==='GET') return vacations;
  if (path==='/vacations'&&method==='POST') { var v={id:nextId(),employee_id:body.employee_id,type_id:body.type_id,start_date:body.start_date,end_date:body.end_date,note:body.note||''}; vacations.push(v); dbSave(); return v; }
  if (path.match(/^\/vacations\/\d+$/)&&method==='PUT') { var vi=vacations.findIndex(function(v){return v.id===parseInt(path.split('/')[2]);}); if(vi>=0){vacations[vi]=Object.assign(vacations[vi],body);dbSave();} return vacations[vi]; }
  if (path.match(/^\/vacations\/\d+$/)&&method==='DELETE') { vacations=vacations.filter(function(v){return v.id!==parseInt(path.split('/')[2]);}); dbSave(); return {}; }
  return {};
}

async function call(method, path, body) {
  if (useBackend) return apiCall(method, path, body);
  return localCall(method, path, body);
}

async function loadAll() {
  // Beim ersten Aufruf pruefen ob Backend da ist
  if (!useBackend) {
    try {
      var res = await fetch('/api/employees', {signal: AbortSignal.timeout(1500)});
      if (res.ok) useBackend = true;
    } catch(e) { useBackend = false; }
  }

  if (useBackend) {
    try {
      var r = await Promise.all([apiCall('GET','/employees'),apiCall('GET','/categories'),apiCall('GET','/vacations')]);
      employees=r[0]; categories=r[1]; vacations=r[2];
    } catch(e) { useBackend = false; }
  }

  if (!useBackend) {
    dbLoad();
    if (categories.length === 0) {
      categories=[{id:'urlaub',name:'Urlaub',color:'#86efac'},{id:'krank',name:'Krank',color:'#fca5a5'},{id:'homeoffice',name:'Homeoffice',color:'#93c5fd'}];
      dbSave();
    }
  }

  if (categories.length > 0 && !selectedType) selectedType = categories[0].id;
  render();
}

function renderOverview() {
  var el = document.getElementById('overview');
  if (!el) return;
  if (!employees.length) { el.innerHTML = ''; return; }

  var MSHORT = ['Jan','Feb','Mar','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  var h = '';

  // Header
  h += '<div class="overview-header">';
  h += '<div class="ov-name-col">Mitarbeiter</div>';
  h += '<div class="ov-months">';
  for (var m = 0; m < 12; m++) {
    h += '<div class="ov-month-hd">'+MSHORT[m]+'</div>';
  }
  h += '</div></div>';

  // Rows per employee
  employees.forEach(function(emp, ei) {
    var col = AVATARCOLORS[ei % AVATARCOLORS.length];
    h += '<div class="ov-row">';
    h += '<div class="ov-name"><div class="emp-avatar" style="background:'+col+'">'+getInitials(emp.name)+'</div><span>'+emp.name+'</span></div>';
    h += '<div class="ov-cells">';

    for (var m = 0; m < 12; m++) {
      var dim = new Date(currentYear, m+1, 0).getDate();
      h += '<div class="ov-cell">';

      // Find all vacations for this employee that overlap this month
      vacations.forEach(function(v) {
        if (v.employee_id !== emp.id) return;
        var ms = dateStr(currentYear, m, 1);
        var me = dateStr(currentYear, m, dim);
        if (v.end_date < ms || v.start_date > me) return;

        // Clamp to month boundaries
        var s = v.start_date < ms ? ms : v.start_date;
        var e = v.end_date > me ? me : v.end_date;
        var sd = parseInt(s.slice(8)) - 1;
        var ed = parseInt(e.slice(8)) - 1;
        var left = (sd / dim * 100).toFixed(2);
        var width = ((ed - sd + 1) / dim * 100).toFixed(2);
        var cat = getCat(v.type_id);

        h += '<div class="ov-bar" style="left:'+left+'%;width:'+width+'%;background:'+cat.color+'"';
        h += ' onmouseenter="showTip(event,'+v.id+')" onmousemove="moveTip(event)" onmouseleave="hideTip()"';
        h += ' onclick="editVac('+v.id+')"></div>';
      });

      h += '</div>';
    }

    h += '</div></div>';
  });

  el.innerHTML = h;
}

function render() {
  document.getElementById('yearDisplay').textContent = currentYear;
  var lh = categories.map(function(c){ return '<div class="legend-item"><div class="legend-dot" style="background:'+c.color+'"></div>'+c.name+'</div>'; }).join('');
  lh += '<div class="legend-item"><div class="legend-dot" style="background:#fef9c3;border:1px solid #fde68a"></div>Feiertag</div>';
  document.getElementById('legend').innerHTML = lh;
  var hols = getHolidays(currentYear);
  var now = new Date();
  var today = dateStr(now.getFullYear(), now.getMonth(), now.getDate());
  renderOverview();
  renderHalf(0, 5, 'cal-h1', hols, today);
  renderHalf(6, 11, 'cal-h2', hols, today);
}

function renderHalf(startM, endM, cid, hols, today) {
  if (!employees.length) { document.getElementById(cid).innerHTML='<div class="loading">Keine Mitarbeiter</div>'; return; }
  var h = '';
  h += '<div class="cal-header"><div class="col-date">Datum</div>';
  employees.forEach(function(emp,ei){
    var col = AVATARCOLORS[ei%AVATARCOLORS.length];
    h += '<div class="col-emp"><div class="emp-avatar" style="background:'+col+'">'+getInitials(emp.name)+'</div><span>'+emp.name+'</span></div>';
  });
  h += '</div>';
  for (var m = startM; m <= endM; m++) {
    var dim = new Date(currentYear, m+1, 0).getDate();
    var mp = pad(m+1);
    var mhols = Object.keys(hols).filter(function(k){ return k.slice(0,7) === currentYear+'-'+mp; });
    h += '<div class="month-block"><div class="month-title">'+MONTHS[m]+' '+currentYear;
    if (mhols.length) h += '<span class="hcount">'+mhols.length+' Feiertag'+(mhols.length>1?'e':'')+'</span>';
    h += '</div>';
    for (var d = 1; d <= dim; d++) {
      var ds = dateStr(currentYear, m, d);
      var dow = new Date(currentYear, m, d).getDay();
      var isWE = dow===0||dow===6;
      var isHol = !!hols[ds];
      var isToday = ds===today;
      var rc = 'day-row'+(isWE?' weekend':'')+(isHol?' holiday':'')+(isToday?' today':'');
      h += '<div class="'+rc+'"><div class="date-cell"><span class="date-dow">'+DAYS[dow]+'</span><span class="date-num">'+d+'.</span>';
      if (isHol) h += '<span class="date-holiday">'+hols[ds]+'</span>';
      h += '</div>';
      employees.forEach(function(emp){
        var vac = null;
        for (var i=0;i<vacations.length;i++) {
          if (vacations[i].employee_id===emp.id && vacations[i].start_date<=ds && vacations[i].end_date>=ds) { vac=vacations[i]; break; }
        }
        h += '<div class="emp-cell" onclick="cellClick('+emp.id+',\''+ds+'\','+(vac?vac.id:'null')+')">';
        if (vac) {
          var cat = getCat(vac.type_id);
          var isS = vac.start_date===ds, isE = vac.end_date===ds;
          var bc = (isS&&isE)?'single':isS?'start':isE?'end':'middle';
          var lbl = isS?(vac.note||cat.name):'';
          h += '<div class="vac-fill '+bc+'" style="background:'+cat.color+'" onmouseenter="showTip(event,'+vac.id+')" onmousemove="moveTip(event)" onmouseleave="hideTip()" onclick="event.stopPropagation();editVac('+vac.id+')">'+lbl+'</div>';
        }
        h += '</div>';
      });
      h += '</div>';
    }
    h += '</div>';
  }
  document.getElementById(cid).innerHTML = h;
}

function showTip(e,vid) {
  var v=vacations.find(function(x){return x.id===vid;}); if(!v)return;
  var emp=employees.find(function(x){return x.id===v.employee_id;});
  var cat=getCat(v.type_id);
  document.getElementById('ttName').textContent=emp?emp.name:'';
  document.getElementById('ttDates').textContent=v.start_date+' - '+v.end_date+' ('+daysInRange(v.start_date,v.end_date)+' Tage)';
  document.getElementById('ttNote').textContent=v.note||cat.name;
  document.getElementById('tooltip').classList.add('visible');
  moveTip(e);
}
function moveTip(e) { var t=document.getElementById('tooltip'); t.style.left=(e.clientX+12)+'px'; t.style.top=(e.clientY-8)+'px'; }
function hideTip() { document.getElementById('tooltip').classList.remove('visible'); }

function cellClick(eid,ds,vid) { if(vid!==null){editVac(vid);}else{openVacModal(eid,ds);} }

function openVacModal(eid,ds) {
  currentEmpId=eid; editingVacId=null;
  document.getElementById('vacTitle').textContent='Eintrag hinzufuegen';
  document.getElementById('deleteVacBtn').style.display='none';
  document.getElementById('startDate').value=ds;
  document.getElementById('endDate').value=ds;
  document.getElementById('vacNote').value='';
  if(categories.length>0) selectedType=categories[0].id;
  renderTypeButtons();
  document.getElementById('vacModal').classList.add('active');
}

function editVac(id) {
  var v=vacations.find(function(x){return x.id===id;}); if(!v)return;
  editingVacId=id; currentEmpId=v.employee_id; selectedType=v.type_id;
  document.getElementById('vacTitle').textContent='Eintrag bearbeiten';
  document.getElementById('deleteVacBtn').style.display='block';
  document.getElementById('startDate').value=v.start_date;
  document.getElementById('endDate').value=v.end_date;
  document.getElementById('vacNote').value=v.note||'';
  renderTypeButtons();
  document.getElementById('vacModal').classList.add('active');
}

function renderTypeButtons() {
  document.getElementById('typeButtons').innerHTML=categories.map(function(c){
    return '<button class="type-btn'+(c.id===selectedType?' selected':'')+'" style="background:'+c.color+'" onclick="selectType(\''+c.id+'\',this)">'+c.name+'</button>';
  }).join('');
}

function selectType(id,btn) {
  selectedType=id;
  document.querySelectorAll('.type-btn').forEach(function(b){b.classList.remove('selected');});
  btn.classList.add('selected');
}

async function saveVac() {
  var s=document.getElementById('startDate').value, e=document.getElementById('endDate').value, n=document.getElementById('vacNote').value;
  if(!s||!e||new Date(s)>new Date(e)){alert('Datum pruefen!');return;}
  var p={employee_id:currentEmpId,type_id:selectedType,start_date:s,end_date:e,note:n};
  if(editingVacId){await call('PUT','/vacations/'+editingVacId,p);}else{await call('POST','/vacations',p);}
  closeModal('vacModal'); await loadAll();
}

async function deleteCurrentVac() {
  if(!editingVacId||!confirm('Eintrag loeschen?'))return;
  await call('DELETE','/vacations/'+editingVacId);
  closeModal('vacModal'); await loadAll();
}

function openEmpModal() { document.getElementById('empName').value=''; renderEmpList(); document.getElementById('empModal').classList.add('active'); }
function renderEmpList() {
  document.getElementById('empList').innerHTML=employees.map(function(e){
    return '<div class="list-row"><span style="flex:1">'+e.name+'</span><button class="delete-btn" onclick="deleteEmployee('+e.id+')">x</button></div>';
  }).join('')||'<div style="color:#94a3b8;font-size:13px">Keine Mitarbeiter</div>';
}
async function addEmployee() {
  var n=document.getElementById('empName').value.trim(); if(!n)return;
  await call('POST','/employees',{name:n});
  document.getElementById('empName').value=''; await loadAll(); renderEmpList();
}
async function deleteEmployee(id) {
  if(!confirm('Mitarbeiter loeschen?'))return;
  await call('DELETE','/employees/'+id); await loadAll(); renderEmpList();
}

function openCatModal() { document.getElementById('catName').value=''; renderCatList(); document.getElementById('catModal').classList.add('active'); }
function renderCatList() {
  document.getElementById('catList').innerHTML=categories.map(function(c){
    return '<div class="list-row"><div style="width:12px;height:12px;border-radius:2px;background:'+c.color+';flex-shrink:0"></div><span style="flex:1">'+c.name+'</span><input type="color" value="'+c.color+'" onchange="updateCatColor(\''+c.id+'\',this.value)" style="width:28px;height:24px;border:1px solid #e2e8f0;border-radius:4px;cursor:pointer;padding:1px"><button class="delete-btn" onclick="deleteCat(\''+c.id+'\')">x</button></div>';
  }).join('');
}
async function addCategory() {
  var n=document.getElementById('catName').value.trim(), col=document.getElementById('catColor').value; if(!n)return;
  var id=n.toLowerCase().replace(/\s+/g,'_')+'_'+Date.now();
  await call('POST','/categories',{id:id,name:n,color:col});
  document.getElementById('catName').value=''; await loadAll(); renderCatList();
}
async function updateCatColor(id,color) {
  var c=categories.find(function(x){return x.id===id;}); if(!c)return;
  await call('PUT','/categories/'+id,{id:id,name:c.name,color:color}); await loadAll(); renderCatList();
}
async function deleteCat(id) {
  if(!confirm('Kategorie loeschen?'))return;
  await call('DELETE','/categories/'+id); await loadAll(); renderCatList();
}

function changeYear(d) { currentYear+=d; render(); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function exportData() {
  var b=new Blob([JSON.stringify({employees:employees,categories:categories,vacations:vacations},null,2)],{type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='urlaubsplan-'+currentYear+'.json'; a.click();
}

document.querySelectorAll('.modal-overlay').forEach(function(o){
  o.addEventListener('click',function(e){if(e.target===o)o.classList.remove('active');});
});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')document.querySelectorAll('.modal-overlay').forEach(function(o){o.classList.remove('active');});
});

setInterval(loadAll, 30000);
loadAll();
</script>
</body>
</html>
